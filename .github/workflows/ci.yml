name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend, database, and migrations
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: roadtalk_test
          POSTGRES_USER: roadtalk
          POSTGRES_PASSWORD: roadtalk_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roadtalk -d roadtalk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://roadtalk:roadtalk_ci_only@localhost:5432/roadtalk_test
      ROADTALK_ENVIRONMENT: test
      ROADTALK_DATABASE_CHECK_ENABLED: "false"
      ROADTALK_LOG_LEVEL: CRITICAL
      ROADTALK_RUN_DATABASE_TESTS: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install --disable-pip-version-check -e 'backend[dev]'
      - name: Check formatting
        run: ruff format --check backend
      - name: Lint
        run: ruff check backend
      - name: Type-check
        working-directory: backend
        run: mypy app tests
      - name: Upgrade empty database
        working-directory: backend
        run: alembic upgrade head
      - name: Check schema drift
        id: schema
        working-directory: backend
        run: |
          set +e
          alembic check > "$RUNNER_TEMP/schema-drift.txt" 2>&1
          status=$?
          cat "$RUNNER_TEMP/schema-drift.txt"
          if [ "$status" -ne 0 ]; then
            diagnostic="$(tail -n 1 "$RUNNER_TEMP/schema-drift.txt" | base64 -w0 | cut -c1-180)"
            echo "diagnostic=$diagnostic" >> "$GITHUB_OUTPUT"
          fi
          exit "$status"
      - name: Preserve schema drift report
        if: ${{ failure() && steps.schema.outputs.diagnostic != '' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: schema-drift-${{ steps.schema.outputs.diagnostic }}
          path: ${{ runner.temp }}/schema-drift.txt
          retention-days: 1
      - name: Run backend tests
        working-directory: backend
        run: pytest --cov=app --cov-branch --cov-report=term-missing
      - name: Verify downgrade and forward migration
        working-directory: backend
        run: |
          alembic downgrade base
          alembic upgrade head

  mobile:
    name: Mobile quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Validate Expo project
        run: npm run doctor
      - name: Type-check
        run: npm run typecheck
      - name: Run mobile tests
        run: npm test -- --watch=false

  security:
    name: Dependencies, secrets, containers, and IaC
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.15.0
          terraform_wrapper: false
      - uses: terraform-linters/setup-tflint@c750028ac0f3831886a261f96da68ab58a92e7ec # v6
        with:
          tflint_version: v0.59.1
      - name: Audit Python dependencies
        run: |
          python -m pip install --disable-pip-version-check -e backend pip-audit==2.10.1
          pip-audit --local --skip-editable
      - name: Audit mobile production dependencies
        working-directory: mobile
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
      - name: Check Sprint 2 privacy and scope
        run: python scripts/ci/check-identity-privacy.py
      - name: Validate and lint Terraform
        id: terraform
        run: |
          set +e
          sh scripts/ci/validate-terraform.sh > "$RUNNER_TEMP/terraform-validation.txt" 2>&1
          status=$?
          cat "$RUNNER_TEMP/terraform-validation.txt"
          if [ "$status" -ne 0 ]; then
            diagnostic="$(grep -v '^[[:space:]]*$' "$RUNNER_TEMP/terraform-validation.txt" | tail -n 4 | base64 -w0 | cut -c1-180)"
            echo "diagnostic=$diagnostic" >> "$GITHUB_OUTPUT"
          fi
          exit "$status"
      - name: Preserve Terraform validation report
        if: ${{ failure() && steps.terraform.outputs.diagnostic != '' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: terraform-validation-${{ steps.terraform.outputs.diagnostic }}
          path: ${{ runner.temp }}/terraform-validation.txt
          retention-days: 1
      - name: Scan dependencies, secrets, Dockerfiles, and Terraform
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Build backend container
        run: docker build --file backend/Dockerfile --tag roadtalk-ci:${{ github.sha }} .
      - name: Scan backend container
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: roadtalk-ci:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Report gated artifacts
        run: sh scripts/ci/report-artifact-gates.sh
