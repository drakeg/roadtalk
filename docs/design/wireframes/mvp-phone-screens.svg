<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="900" viewBox="0 0 1680 900">
<style>
text{font-family:Arial,sans-serif;fill:#14202b}.title{font-size:26px;font-weight:700}.h{font-size:20px;font-weight:700}.b{font-size:16px}.s{font-size:14px;fill:#52606d}.phone{fill:#f8fafc;stroke:#14202b;stroke-width:4}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2}.btn{fill:#146c94}.danger{fill:#c93838}.receive{fill:#5b3f9b}.disabled{fill:#94a3b8}.white{fill:#fff;font-weight:700}.status{fill:#e8f5ee;stroke:#5a9f75}.nav{fill:#eef2f6}
</style>
<rect width="1680" height="900" fill="#e8edf2"/>
<text x="40" y="44" class="title">RoadTalk MVP — phone interaction baseline</text>
<!-- Ready -->
<g transform="translate(40,75)"><rect class="phone" rx="34" width="370" height="780"/><text x="28" y="52" class="h">RoadTalk</text><rect class="status" x="25" y="75" rx="12" width="320" height="62"/><text x="45" y="101" class="b">Connected • Location current</text><text x="45" y="124" class="s">7 people nearby</text><rect class="card" x="25" y="160" rx="14" width="320" height="78"/><text x="45" y="190" class="s">CHANNEL</text><text x="45" y="220" class="h">RV</text><circle class="btn" cx="185" cy="455" r="118"/><text x="185" y="445" text-anchor="middle" class="white" font-size="26">HOLD TO TALK</text><text x="185" y="478" text-anchor="middle" class="white" font-size="15">Ready</text><rect class="nav" y="700" width="370" height="80"/><text x="80" y="746" class="b">Channels</text><text x="265" y="746" class="b">Settings</text><text x="185" y="675" text-anchor="middle" class="s">Main radio — ready</text></g>
<!-- Transmit -->
<g transform="translate(450,75)"><rect class="phone" rx="34" width="370" height="780"/><text x="28" y="52" class="h">RoadTalk</text><rect class="card" x="25" y="75" rx="12" width="320" height="62"/><text x="45" y="104" class="b">RV channel</text><text x="45" y="127" class="s">Microphone active</text><circle class="danger" cx="185" cy="400" r="130"/><text x="185" y="382" text-anchor="middle" class="white" font-size="28">TRANSMITTING</text><text x="185" y="420" text-anchor="middle" class="white" font-size="22">00:08</text><text x="185" y="456" text-anchor="middle" class="white" font-size="16">Release to stop</text><rect class="card" x="25" y="575" rx="12" width="320" height="80"/><text x="45" y="607" class="b">Keep your attention on travel.</text><text x="45" y="633" class="s">RoadTalk is not an emergency service.</text><text x="185" y="700" text-anchor="middle" class="s">PTT held — navigation locked</text></g>
<!-- Receive -->
<g transform="translate(860,75)"><rect class="phone" rx="34" width="370" height="780"/><text x="28" y="52" class="h">RoadTalk</text><rect class="status" x="25" y="75" rx="12" width="320" height="62"/><text x="45" y="104" class="b">Connected • RV</text><text x="45" y="127" class="s">Nearby audio</text><circle class="receive" cx="185" cy="390" r="122"/><text x="185" y="374" text-anchor="middle" class="white" font-size="28">RECEIVING</text><text x="185" y="414" text-anchor="middle" class="white" font-size="20">MALLARD-1</text><text x="185" y="446" text-anchor="middle" class="white" font-size="15">Nearby • exact location hidden</text><rect class="card" x="70" y="555" rx="12" width="230" height="58"/><text x="185" y="591" text-anchor="middle" class="b">Mute MALLARD-1</text><circle class="disabled" cx="185" cy="675" r="42"/><text x="185" y="681" text-anchor="middle" class="white" font-size="13">PTT BUSY</text><text x="185" y="748" text-anchor="middle" class="s">Receiving state</text></g>
<!-- Degraded -->
<g transform="translate(1270,75)"><rect class="phone" rx="34" width="370" height="780"/><text x="28" y="52" class="h">RoadTalk</text><rect fill="#fff3cd" stroke="#c28a00" stroke-width="2" x="25" y="75" rx="12" width="320" height="92"/><text x="45" y="108" class="b">Location unavailable</text><text x="45" y="134" class="s">Nearby eligibility cannot be checked.</text><text x="45" y="155" class="s">PTT is disabled.</text><circle class="disabled" cx="185" cy="365" r="118"/><text x="185" y="357" text-anchor="middle" class="white" font-size="24">NOT READY</text><text x="185" y="390" text-anchor="middle" class="white" font-size="15">No current location</text><rect class="btn" x="60" y="535" rx="12" width="250" height="60"/><text x="185" y="572" text-anchor="middle" class="white" font-size="17">Retry foreground location</text><rect class="card" x="60" y="615" rx="12" width="250" height="60"/><text x="185" y="652" text-anchor="middle" class="b">Open OS settings</text><text x="185" y="730" text-anchor="middle" class="s">Denied, stale, or disconnected</text></g>
</svg>